- name: Install and configure Nginx
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache and upgrade distro
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Install latest Nginx
      apt:
        name: nginx
        state: latest
      notify: Restart nginx

  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes
